name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  app-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate UX quality gate contract
        run: npm run ci:workflow

      - name: Run tests
        run: npm run ci:test

      - name: Run lint
        run: npm run ci:lint

      - name: Validate agent model contract
        run: npm run ci:agent-models

      - name: Build app
        run: npm run ci:build

  firestore-rules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Check Firestore rules
        run: npm run ci:rules
